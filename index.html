<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Tasleem Adedokun (tasleemadedokun)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <main>
      <h1>TV Show Episode Viewer</h1>

      <div id="navBar"></div>

      <div class="searchContainer">
        <div id="showControls">
          <label for="tvShowSelector">
            <strong>Choose a show:</strong>
          </label>
          <select id="tvShowSelector"></select>
        </div>

        <div id="searchControls">
          <label for="searchInput">
            <strong>Search:</strong>
          </label>
          <input placeholder="Search..." id="searchInput" />
        </div>

        <div id="episodeControls">
          <label for="selectEpisode">
            <strong>Choose episodes:</strong>
          </label>
          <select id="selectEpisode"></select>
        </div>

        <div id="stats">
          <span>Displaying </span>
          <span id="searchResultDisplaying"></span>
          <span> / </span>
          <span id="allEpisodesLength"></span>
        </div>
      </div>

      <div id="root"></div>
    </main>

    <footer>
      <p>
        Data provided by
        <a
          href="https://www.tvmaze.com/"
          target="_blank"
          rel="noopener noreferrer"
        >
          TVMaze
        </a>
      </p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
